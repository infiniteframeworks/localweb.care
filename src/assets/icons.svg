<svg xmlns="http://www.w3.org/2000/svg">

  <!-- globe: web / internet -->
  <symbol id="icon-globe" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M2 12h20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- pin: location / local SEO -->
  <symbol id="icon-pin" viewBox="0 0 24 24">
    <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="1.75"/>
  </symbol>

  <!-- chart: analytics / Google Business -->
  <symbol id="icon-chart" viewBox="0 0 24 24">
    <line x1="18" y1="20" x2="18" y2="10" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="12" y1="20" x2="12" y2="4"  stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="6"  y1="20" x2="6"  y2="14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="2"  y1="20" x2="22" y2="20" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </symbol>

  <!-- pencil: writing / content strategy -->
  <symbol id="icon-pencil" viewBox="0 0 24 24">
    <path d="M12 20h9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- users: partnership / people -->
  <symbol id="icon-users" viewBox="0 0 24 24">
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="9" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <path d="M23 21v-2a4 4 0 0 0-3-3.87" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M16 3.13a4 4 0 0 1 0 7.75" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- bolt: speed / modern tech -->
  <symbol id="icon-bolt" viewBox="0 0 24 24">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- trending-up: results / growth metrics -->
  <symbol id="icon-trending" viewBox="0 0 24 24">
    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="17 6 23 6 23 12"               fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- home: community / local -->
  <symbol id="icon-home" viewBox="0 0 24 24">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="9 22 9 12 15 12 15 22"          fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- target: clarity / focus -->
  <symbol id="icon-target" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <circle cx="12" cy="12" r="6"  fill="none" stroke="currentColor" stroke-width="1.75"/>
    <circle cx="12" cy="12" r="2"  fill="none" stroke="currentColor" stroke-width="1.75"/>
  </symbol>

  <!-- star: craft / quality -->
  <symbol id="icon-star" viewBox="0 0 24 24">
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- sprout: growth / potential -->
  <symbol id="icon-sprout" viewBox="0 0 24 24">
    <path d="M12 22v-9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M12 13c0 0-5-1-6.5-6 0 0 4.5 0 6.5 6z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 13c0 0 5-1 6.5-6 0 0-4.5 0-6.5 6z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M5 21h14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </symbol>

  <!-- wrench: maintenance / tools -->
  <symbol id="icon-wrench" viewBox="0 0 24 24">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- mail: email -->
  <symbol id="icon-mail" viewBox="0 0 24 24">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="22,6 12,13 2,6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- clock: response time -->
  <symbol id="icon-clock" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <polyline points="12 6 12 12 16 14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- sun: light mode -->
  <symbol id="icon-sun" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="1.75"/>
    <line x1="12" y1="1"     x2="12" y2="3"     stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="12" y1="21"    x2="12" y2="23"    stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="4.22" y1="4.22"   x2="5.64" y2="5.64"   stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="1"  y1="12"    x2="3"  y2="12"    stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="21" y1="12"    x2="23" y2="12"    stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="4.22" y1="19.78"  x2="5.64" y2="18.36"  stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"  stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </symbol>

  <!-- storefront: local business / brick-and-mortar -->
  <symbol id="icon-storefront" viewBox="0 0 24 24">
    <path d="M3 9l1-5h16l1 5" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 9a3 3 0 0 0 6 0 3 3 0 0 0 6 0 3 3 0 0 0 6 0" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M5 21V12h5v4h4v-4h5v9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="3" y1="21" x2="21" y2="21" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </symbol>

  <!-- moon: dark mode -->
  <symbol id="icon-moon" viewBox="0 0 24 24">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

</svg>
